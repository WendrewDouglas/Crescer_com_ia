name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Debug FTP - list remote directories
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl -s --ftp-method nocwd --list-only "ftp://u879090414:${FTP_PASSWORD}@45.132.157.22/" || echo "Root listing failed"
          echo "---"
          curl -s --ftp-method nocwd --list-only "ftp://u879090414:${FTP_PASSWORD}@45.132.157.22/public_html/" || echo "public_html listing failed"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 45.132.157.22
          username: u879090414
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: public_html/
          dangerous-clean-slate: true
